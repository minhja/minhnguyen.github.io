baseurl: "https://minhnguyen-phd.com/"
locale: "en-us"
title: "Dr. Minh N. Nguyen"
theme: "hugo-xmin"
googleAnalytics: ""
disqusShortname: ""
ignoreFiles: ["\\.Rmd$", "\\.Rmarkdown$", "_cache$"]
footnotereturnlinkcontents: "↩"

permalinks:
  posts: "/posts/:year/:month/:day/:slug/"

menus:
  main:
    - name: Home
      url: /
      weight: 10
    - name: Research
      url: /research
      weight: 20
    - name: Posts
      url: /posts
      weight: 30
    - name: Publications
      url: /pubs
      weight: 40
    - name: CV
      url: /cv
      weight: 50

params:
  description: "Dr. Minh N. Nguyen"
  footer: "&copy; Minh N. Nguyen ({Year}). [Subscribe RSS.](/index.xml)"

caches:
  images:
    dir: :cacheDir/images

markup:
  highlight:
    codeFences: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
          - - \[
            - \]
          - - $$
            - $$
          inline:
          - - \(
            - \)
